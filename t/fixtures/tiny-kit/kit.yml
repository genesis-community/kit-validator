---
name: tiny
version: 0.0.1

authors:
  - Kit Validator Test Fixture

docs: https://github.com/genesis-community/kit-validator
code: https://github.com/genesis-community/kit-validator

genesis_version_min: 3.1.0

description: |
  Synthetic minimal kit used to smoke-test the kit-validator framework
  end-to-end.  Exercises: kit-linking, secret generation, manifest
  synthesis, prune, bosh interpolation, spruce-diff golden compare.
  NOT a real deployable kit; releases and stemcells are empty.

supports:
  - test

# Declared as a director-service kit so `genesis check` doesn't try
# to look up an external BOSH director for the env -- tiny-kit is a
# smoke fixture, not a real deploy.  Real kits will either be
# director kits themselves (bosh, blacksmith, etc.) or reference a
# director via a spec/exodus/*.yml stub.
services:
  - director

credentials:
  base:
    hello:
      password: random 32 fixed
