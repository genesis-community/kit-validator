---
name: (( concat "tiny-" genesis.env ))

instance_groups:
- name: hello
  instances: 1
  properties:
    greeting: (( concat "Hello, " genesis.env "!" ))
    password: (( vault meta.vault "/hello:password" ))

releases: []
stemcells: []

update:
  canaries: 1
  canary_watch_time: 30000
  update_watch_time: 30000
  max_in_flight: 1
